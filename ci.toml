# Required fields
crate_name  = "qrx" # name for crates.io
binary_name = "qrx" # name for the binary
pkgdesc     = "CLI tool to capture a screen region, decode any QR code found, and copy the result to clipboard."

# AUR / NUR: space-separated runtime dependencies
# aur_depends      = "'glibc' 'openssl'"
nur_build_inputs = "xorg.libxcb"

# Extra apt packages needed to compile on Ubuntu (CI build machines)
extra_apt_packages = "libxcb1-dev libwayland-dev"

# Shell completions: set to true if the binary exposes a `completion <shell>` subcommand
# has_shell_completions   = "true"
# completion_subcommand   = "completion"    # default; change if your CLI uses a different subcommand
